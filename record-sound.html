<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perekam Suara</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .status {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            min-height: 20px;
        }

        .visualizer {
            width: 100%;
            height: 60px;
            background: #eef1f6;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .recording-wave {
            width: 10px;
            height: 10px;
            background: #ff4d4d;
            border-radius: 50%;
            display: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .recording .recording-wave {
            display: block;
            animation: pulse 1.5s infinite;
        }

        .controls {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        #btnStart {
            background-color: #007bff;
            color: white;
        }

        #btnStart:hover { background-color: #0056b3; }

        #btnStop {
            background-color: #dc3545;
            color: white;
            display: none;
        }

        #btnStop:hover { background-color: #bd2130; }

        .audio-preview {
            margin-top: 15px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        audio {
            width: 100%;
        }

        #btnDownload {
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        #btnDownload:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h1>Perekam Suara</h1>
    <div class="status" id="status">Klik "Mulai Rekam" untuk berbicara</div>
    
    <div class="visualizer" id="visualizer">
        <div class="recording-wave"></div>
    </div>

    <div class="controls">
        <button id="btnStart">Mulai Rekam</button>
        <button id="btnStop">Berhentikan</button>
    </div>

    <div class="audio-preview" id="previewContainer">
        <h3>Hasil Rekaman:</h3>
        <audio id="audioPlayback" controls></audio>
        <a id="btnDownload" href="#" download="rekaman-suara.webm">⬇️ Download Rekaman</a>
    </div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const btnDownload = document.getElementById('btnDownload');
    const audioPlayback = document.getElementById('audioPlayback');
    const statusText = document.getElementById('status');
    const visualizer = document.getElementById('visualizer');
    const previewContainer = document.getElementById('previewContainer');

    // Cek dukungan browser
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        statusText.innerText = "Browser Anda tidak mendukung perekaman suara.";
        btnStart.disabled = true;
    }

    btnStart.addEventListener('click', async () => {
        audioChunks = []; // Reset data rekaman sebelumnya
        
        try {
            // Meminta izin akses mikrofon
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    audioChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                // Menggabungkan chunk data menjadi satu Blob audio
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(audioBlob);
                
                // Pasang ke pemutar audio dan tombol download
                audioPlayback.src = audioUrl;
                btnDownload.href = audioUrl;
                
                // Tampilkan container preview
                previewContainer.style.display = 'flex';
                statusText.innerText = "Selesai merekam. Silakan dengar atau unduh.";
                
                // Matikan mikrofon setelah selesai digunakan
                stream.getTracks().forEach(track => track.stop());
            };

            // Mulai merekam
            mediaRecorder.start();
            
            // Update UI
            btnStart.style.display = 'none';
            btnStop.style.display = 'block';
            previewContainer.style.display = 'none';
            visualizer.classList.add('recording');
            statusText.innerText = "Sedang merekam... Bicara sekarang.";

        } catch (err) {
            console.error("Gagal mengakses mikrofon:", err);
            statusText.innerText = "Gagal mengakses mikrofon. Berikan izin akses terlebih dahulu.";
        }
    });

    btnStop.addEventListener('click', () => {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            
            // Update UI kembali ke awal
            btnStart.style.display = 'block';
            btnStop.style.display = 'none';
            visualizer.classList.remove('recording');
        }
    });
</script>

</body>
</html>
