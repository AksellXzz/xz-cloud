<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Camera IP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #1a1a2e, #16161a);
            color: white;
            padding: 20px;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
        }
        h1 {
            margin-top: 10px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        /* --- LIQUID GLASS STYLE ELEMENT --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37),
                        inset 0 4px 4px 0 rgba(255, 255, 255, 0.1);
        }

        /* --- BATTERY INDICATOR --- */
        .battery-container {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            margin-bottom: 20px;
        }
        .battery-icon-wrapper {
            position: relative;
            width: 45px;
            height: 22px;
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 6px;
            padding: 2px;
            box-sizing: border-box;
        }
        .battery-icon-wrapper::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 5px;
            width: 3px;
            height: 8px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 0 3px 3px 0;
        }
        .battery-liquid {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00b4db, #00adb5);
            border-radius: 3px;
            transition: width 0.5s ease, background 0.5s ease;
            box-shadow: 0 0 10px rgba(0, 173, 181, 0.5);
        }
        #battery-text {
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        /* --- CLOCK AND DATE PANEL --- */
        .clock-container {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 30px;
            min-width: 250px;
        }
        #digital-clock {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #00adb5;
            text-shadow: 0 0 10px rgba(0, 173, 181, 0.3);
        }
        #current-day {
            font-size: 0.95rem;
            color: #ccc;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- REMOTE ACCESS PANEL --- */
        .remote-container {
            display: inline-block;
            margin-top: 20px;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        .remote-container h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #00adb5;
        }
        .ip-input-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 12px;
        }
        .ip-input-group input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            text-align: center;
            width: 180px;
        }
        .ip-input-group input:focus {
            outline: none;
            border-color: #00adb5;
        }
        .ip-input-group button {
            padding: 8px 16px;
            font-size: 14px;
            margin: 0;
            box-shadow: none;
        }
        .access-link-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 6px;
            border: 1px dashed rgba(0, 173, 181, 0.4);
            word-break: break-all;
        }
        .access-link-box a {
            color: #00fff2;
            text-decoration: none;
            font-weight: bold;
            font-family: monospace;
            font-size: 14px;
        }
        .access-link-box a:hover {
            text-decoration: underline;
        }
        .hint-text {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
            line-height: 1.4;
        }

        /* --- CAMERA INTERFACE --- */

            display: inline-block;
            width: 100%;
            max-width: 600px;
