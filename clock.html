<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Liquid Glass Clock</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 320px;
        }

        #time { font-size: 4rem; font-weight: 700; letter-spacing: -2px; }
        #date { font-size: 1.2rem; opacity: 0.9; margin-top: 10px; }

        /* --- Style Tambahan untuk Komponen Baterai --- */
        .battery-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .battery-outer {
            width: 50px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 6px;
            padding: 2px;
            position: relative;
            display: flex;
            align-items: center;
        }

        /* Kepala/Ujung Baterai */
        .battery-outer::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 6px;
            width: 4px;
            height: 8px;
            background: rgba(255, 255, 255, 0.8);
            border-top-right-radius: 2px;
            border-bottom-right-radius: 2px;
        }

        .battery-level {
            height: 100%;
            width: 0%; /* Diatur dinamis via JS */
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 3px;
            transition: width 0.5s ease, background-color 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Warna Hijau saat Mengecas */
        .charging .battery-outer {
            border-color: #34c759;
        }
        .charging .battery-outer::after {
            background: #34c759;
        }
        .charging .battery-level {
            background-color: #34c759;
        }

        /* Ikon Petir Kecil saat Mengecas */
        .lightning-bolt {
            display: none;
            font-size: 0.7rem;
            color: white;
            font-weight: bold;
        }
        .charging .lightning-bolt {
            display: block;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div id="time">00:00:00</div>
        <div id="date">Hari, 00 Bulan 0000</div>
        
        <div class="battery-container" id="battery-wrapper">
            <div class="battery-outer">
                <div class="battery-level" id="battery-level">
                    <span class="lightning-bolt">⚡</span>
                </div>
            </div>
            <span id="battery-percentage">0%</span>
        </div>
    </div>

    <script>
        // 1. Fungsi Jam & Tanggal (Bawaan)
        function updateClock() {
            const now = new Date();
            
            const timeString = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById('time').textContent = timeString;

            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            const dateString = now.toLocaleDateString('id-ID', options);
            document.getElementById('date').textContent = dateString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Fungsi Fitur Baterai Baru
        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                function updateBatteryStatus() {
                    const level = Math.round(battery.level * 100);
                    const isCharging = battery.charging;
                    
                    // Update Teks Persentase di Luar Kotak
                    document.getElementById('battery-percentage').textContent = level + '%';
                    
                    // Update Lebar Isi Baterai
                    document.getElementById('battery-level').style.width = level + '%';
                    
                    // Cek Status Cas untuk Perubahan Warna
                    const wrapper = document.getElementById('battery-wrapper');
                    if (isCharging) {
                        wrapper.classList.add('charging');
                    } else {
                        wrapper.classList.remove('charging');
                    }
                }

                // Jalankan saat pertama kali dimuat
                updateBatteryStatus();

                // Dengarkan perubahan jika kabel cas dicolok/cabut atau persentase berubah
                battery.addEventListener('chargingchange', updateBatteryStatus);
                battery.addEventListener('levelchange', updateBatteryStatus);
            });
        } else {
            // Sembunyikan container jika browser tidak mendukung Battery API (ex: iOS Safari versi lama)
            document.getElementById('battery-wrapper').style.display = 'none';
        }
    </script>
</body>
</html>
